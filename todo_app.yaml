apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app03
  labels:
    app: todo-app03
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app03
  template:
    metadata:
      labels:
        app: todo-app03       
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: todo-app03
        image: 183071452060.dkr.ecr.ap-northeast-2.amazonaws.com/todo-app03:f5a0f43
        ports:
        - containerPort: 5000
