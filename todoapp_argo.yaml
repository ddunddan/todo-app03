apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app03
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/ddunddan/todo-app03.git
    targetRevision: HEAD
    path: .
    kustomize:
      namePrefix: ""
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
